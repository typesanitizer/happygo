version: "2"

linters:
  enable:
    - bodyclose
    - depguard
    - errcheck
    - exhaustive
    - exhaustruct
    - exptostd
    - forbidigo
    - gochecksumtype
    - importas
    - ineffassign
    - musttag
    # TODO: Let's create our own version of paralleltest which understands
    # Harness.Parallel instead of literally looking for t.Parallel.
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    rules:
      # common/core is designed for dot-import usage.
      - linters: [staticcheck]
        text: "ST1001"
        source: 'common/core'
      - linters: [forbidigo]
        path: ^common/core/pathx/pathx.go$
        source: 'os\.(MkdirAll|MkdirTemp|RemoveAll|ReadDir|Stat|ReadFile)'
      - linters: [forbidigo]
        path: ^common/core/pathx/pathx.go$
        source: 'filepath\.(Abs|Join|Split|Dir|Rel|IsAbs|Clean)'
      - linters: [forbidigo]
        path: ^common/check/check.go$
        source: 'filepath\.(Abs|Join|Split|Dir|Rel|IsAbs|Clean)'
      - linters: [forbidigo]
        path: ^common/core/pathx/pathx_test.go$
        source: 'filepath\.(Abs|Join|Split|Dir|Rel|IsAbs|Clean)'
    # Upstream projects are excluded; linting only applies to our code.
    # SYNC(id: linter-exclusions)
    paths:
      - ^go/
      - ^tools/
      - ^delve/
  settings:
    depguard:
      rules:
        # "Main" is the rule name; depguard requires at least one named rule.
        Main:
          list-mode: lax
          deny:
            - pkg: "errors"
              desc: "use common/errorx instead of stdlib errors"
            - pkg: "github.com/cockroachdb/errors"
              desc: "use common/errorx instead of cockroachdb/errors directly"
            - pkg: "log"
              desc: "use common/logx instead of stdlib log"
            - pkg: "log/slog"
              desc: "use common/logx instead of log/slog"
            - pkg: "github.com/charmbracelet/log"
              desc: "use common/logx instead of charmbracelet/log directly"
    importas:
      no-unaliased: true
      alias:
        - pkg: github.com/typesanitizer/happygo/common/core
          alias: .
    exhaustruct:
      # NOTE: Even with allow-empty-returns: false, exhaustruct unconditionally
      # allows empty structs in error return statements (i.e. `return T{}, err`
      # where err implements error). This is hardcoded with no toggle:
      # https://github.com/GaijinEntertainment/go-exhaustruct/blob/237ddb3/analyzer/analyzer.go#L109-L112
      exclude:
        - ^github\.com/urfave/cli/v3\.(Command|FlagBase|StringFlag|BoolFlag)$
    forbidigo:
      analyze-types: true
      forbid:
        - pattern: ^fmt\.Errorf$
          msg: use common/errorx instead of fmt.Errorf
        - pattern: ^errors\.New$
          msg: use common/errorx instead of errors.New
        - pattern: ^fmt\.Print(f|ln)?$
          msg: use common/logx instead of fmt.Print*
        - pattern: ^log\.Print(f|ln)?$
          msg: use common/logx instead of log.Print*
        - pattern: ^print(ln)?$
          msg: do not use builtin print/println
        - pattern: ^testing\.T\.Errorf$
          msg: use common/check Harness assertions instead of t.Errorf
        - pattern: ^testing\.T\.Fatalf$
          msg: use common/check Harness assertions instead of t.Fatalf
        - pattern: ^testing\.T\.Run$
          msg: use Harness.Run instead of t.Run
        - pattern: ^testing\.T\.Parallel$
          msg: use Harness.Parallel instead of t.Parallel
        - pattern: ^os\.MkdirAll$
          msg: use AbsPath.MkdirAll instead of os.MkdirAll
        - pattern: ^os\.MkdirTemp$
          msg: use AbsPath.MkdirTemp instead of os.MkdirTemp
        - pattern: ^os\.RemoveAll$
          msg: use AbsPath.RemoveAll instead of os.RemoveAll
        - pattern: ^os\.ReadDir$
          msg: use AbsPath.ReadDir instead of os.ReadDir
        - pattern: ^os\.Stat$
          msg: use AbsPath.Stat instead of os.Stat
        - pattern: ^os\.ReadFile$
          msg: use AbsPath.ReadFile instead of os.ReadFile
        - pattern: ^filepath\.Abs$
          msg: use pathx.ResolveAbsPath instead of filepath.Abs
        - pattern: ^filepath\.Join$
          msg: use AbsPath.Join/JoinComponents instead of filepath.Join
        - pattern: ^filepath\.Split$
          msg: use AbsPath.Split instead of filepath.Split
        - pattern: ^filepath\.Dir$
          msg: use AbsPath.Dir instead of filepath.Dir
        - pattern: ^filepath\.Rel$
          msg: use AbsPath.MakeRelativeTo instead of filepath.Rel
        - pattern: ^filepath\.IsAbs$
          msg: use typed path APIs instead of filepath.IsAbs
        - pattern: ^filepath\.Clean$
          msg: use typed path APIs instead of filepath.Clean
