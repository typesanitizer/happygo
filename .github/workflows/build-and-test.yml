name: build-and-test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

# STYLE NOTES:
# - Do not change the working directory (using 'cd' or otherwise).

env:
  GOCACHE: ${{ github.workspace }}/.cache/go-build

jobs:
  build-head:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-toolchain
        with:
          os: ${{ inputs.os }}
          toolchain: head

  build-gotip:
    runs-on: ${{ inputs.os }}
    steps:
      # Sparse checkout: only fetch .github/ to access the action.
      # The action will checkout golang/go into go/.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github
      - uses: ./.github/actions/build-toolchain
        with:
          os: ${{ inputs.os }}
          toolchain: gotip

  test-std:
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Test
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          # GHA Windows runners are slower than LUCI; without extra
          # headroom, TestGdbAutotmpTypes alone takes 48s+ and the
          # runtime package hits the 3m timeout.
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            export GO_TEST_TIMEOUT_SCALE=2
          fi
          go tool dist test -run='!^cmd'

  test-cmd:
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Test
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          go tool dist test -run='^cmd'

  test-tools:
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Test
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          go test -C tools ./...

  test-first-party:
    name: go test (first-party)
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Test
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          patterns=$(go run ./misc/cmd/happydo list --type=go-module --provenance=first-party | sed 's|.*|./&/...|')
          go test -race $patterns

  lint-first-party:
    name: golangci-lint (first-party)
    # Only lint on Ubuntu; macOS runners are more limited and we
    # don't want them occupied by lint-only jobs.
    if: inputs.os == 'ubuntu-latest'
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Lint
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          export CGO_ENABLED=0
          patterns=$(go run ./misc/cmd/happydo list --type=go-module --provenance=first-party | sed 's|.*|./&/...|')
          # Version is pinned via the tool dependency in common/go.mod;
          # see NOTE(id: workspace-tool-directives).
          go tool golangci-lint run $patterns

  test-delve:
    name: test-delve (${{ matrix.go-toolchain }})
    runs-on: ${{ inputs.os }}
    needs: [build-head, build-gotip]
    continue-on-error: ${{ matrix.go-toolchain == 'gotip' }}
    strategy:
      matrix:
        go-toolchain: [head, stable, gotip]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Stable Go is used only for fixture builds; capture its GOROOT before PATH changes.
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        if: matrix.go-toolchain == 'stable'
        with:
          go-version: 1.25.x
          # setup-go cache warns when GOCACHE is customized; we manage caching explicitly.
          # See https://github.com/typesanitizer/happygo/actions/runs/20907489161/job/60063662688
          cache: false
      - name: Capture stable GOROOT
        id: stable-goroot
        if: matrix.go-toolchain == 'stable'
        shell: bash
        run: echo "path=$(go env GOROOT)" >> $GITHUB_OUTPUT
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        if: matrix.go-toolchain == 'gotip'
        with:
          name: go-gotip-${{ inputs.os }}
          path: gotip-artifact
      - name: Unpack toolchain (tar)
        if: matrix.go-toolchain == 'gotip'
        shell: bash
        run: |
          mkdir -p gotip
          shopt -s nullglob
          archives=(gotip-artifact/*.tgz)
          test "${#archives[@]}" -eq 1
          tar -xzf "${archives[0]}" -p -C gotip
      # NOTE(id: delve-windows-test-dep-setup): Mirrors logic in delve/_scripts/test_windows.ps1.
      - name: Install procdump (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.sysinternals.com/files/Procdump.zip" -OutFile "$env:TEMP\procdump.zip"
          Expand-Archive -Force -LiteralPath "$env:TEMP\procdump.zip" -DestinationPath "$env:RUNNER_TOOL_CACHE\procdump"
          echo "$env:RUNNER_TOOL_CACHE\procdump" >> $env:GITHUB_PATH
      - name: Test
        shell: bash
        env:
          STABLE_GO_ROOT: ${{ steps.stable-goroot.outputs.path }}
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          # Use a custom go tool when building fixtures for stable/gotip.
          case "${{ matrix.go-toolchain }}" in
            stable) export DELVE_TEST_GO="$STABLE_GO_ROOT/bin/go" ;;
            gotip)  export DELVE_TEST_GO="$PWD/gotip/bin/go" ;;
            head)   ;;
          esac
          go test -C delve ./...
