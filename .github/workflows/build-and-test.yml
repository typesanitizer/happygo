name: build-and-test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

# STYLE NOTES:
# - Do not change the working directory (using 'cd' or otherwise).

env:
  GOCACHE: ${{ github.workspace }}/.cache/go-build

jobs:
  build-head:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-toolchain
        with:
          os: ${{ inputs.os }}
          toolchain: head

  stress-delve:
    name: stress-delve (head)
    runs-on: ${{ inputs.os }}
    needs: build-head
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Stress test Delve on macOS
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          ./.github/scripts/delve-stress-kx.sh .artifacts/delve-stress
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: delve-stress-${{ inputs.os }}
          path: .artifacts/delve-stress
