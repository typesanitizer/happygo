name: build-and-test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

# STYLE NOTES:
# - Do not change the working directory (using 'cd' or otherwise).

env:
  GOCACHE: ${{ github.workspace }}/.cache/go-build

jobs:
  build-head:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-toolchain
        with:
          os: ${{ inputs.os }}
          toolchain: head

  build-gotip:
    if: false
    runs-on: ${{ inputs.os }}
    steps:
      # Sparse checkout: only fetch .github/ to access the action.
      # The action will checkout golang/go into go/.
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/build-toolchain
        with:
          os: ${{ inputs.os }}
          toolchain: gotip

  test-std:
    if: false
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Test
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          # GHA Windows runners are slower than LUCI; without extra
          # headroom, TestGdbAutotmpTypes alone takes 48s+ and the
          # runtime package hits the 3m timeout.
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            export GO_TEST_TIMEOUT_SCALE=2
          fi
          go tool dist test -run='!^cmd'

  test-cmd:
    if: false
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Test
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          go tool dist test -run='^cmd'

  test-tools:
    if: false
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Test
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          go test -C tools ./...

  test-first-party:
    name: go test (first-party)
    if: false
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Test
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          patterns=$(go run ./meta/cmd list --type=go-module --provenance=first-party | sed 's|.*|./&/...|')
          go test $patterns

  lint-first-party:
    name: golangci-lint (first-party)
    if: false
    runs-on: ${{ inputs.os }}
    needs: build-head
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      - name: Lint
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          export CGO_ENABLED=0
          patterns=$(go run ./meta/cmd list --type=go-module --provenance=first-party | sed 's|.*|./&/...|')
          # Version is pinned via the tool dependency in common/go.mod;
          # see NOTE(id: workspace-tool-directives).
          go tool golangci-lint run $patterns

  test-delve:
    name: test-delve (${{ matrix.go-toolchain }})
    runs-on: ${{ inputs.os }}
    needs: [build-head]
    strategy:
      matrix:
        go-toolchain: [head]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-head-toolchain
        with:
          os: ${{ inputs.os }}
      # NOTE(id: delve-windows-test-dep-setup): Mirrors logic in delve/_scripts/test_windows.ps1.
      - name: Install procdump (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.sysinternals.com/files/Procdump.zip" -OutFile "$env:TEMP\procdump.zip"
          Expand-Archive -Force -LiteralPath "$env:TEMP\procdump.zip" -DestinationPath "$env:RUNNER_TOOL_CACHE\procdump"
          echo "$env:RUNNER_TOOL_CACHE\procdump" >> $env:GITHUB_PATH
      - name: Test
        shell: bash
        run: |
          export GOROOT="$PWD/go"
          export PATH="$GOROOT/bin:$PATH"
          go test -C delve ./pkg/proc -run '^TestWaitFor$' -count=100
