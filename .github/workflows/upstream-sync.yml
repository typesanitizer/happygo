name: upstream-sync

on:
  workflow_dispatch:
    inputs:
      project:
        description: Project to sync
        required: true
        default: all
        type: choice
        options:
          - all
          - go
          - tools
          - delve
      base:
        description: Branch of happygo repo to sync onto
        required: true
        default: main
        type: string
      push:
        # Set to false to dry-run the sync without pushing or creating PRs.
        description: Push merge-bot/sync/* branches after sync
        required: true
        default: true
        type: boolean
  schedule:
    # 16:00 UTC = 17:00 CET (winter) / 18:00 CEST (summer)
    #        .--- minute (0-59)
    #        | .--- hour (0-23, UTC)
    #        | |  .--- day of month (1-31)
    #        | |  | .--- month (1-12)
    #        | |  | | .--- day of week (0-6, Sun=0)
    #        | |  | | |
    - cron: "0 16 * * *"

# Prevent overlapping syncs from racing on the same merge-bot branches.
concurrency:
  group: upstream-sync
  cancel-in-progress: true

# SYNC(id: gha-permissions)
# The mergebot has the following permissions:
# - Read access to metadata
# - Read and write access to code, issues, merge queues, and pull requests 
#
# So we need zero permissions on the normal GITHUB_TOKEN,
# because we never use it.
permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # This step directly accesses the GitHub API, and does not
      # use GITHUB_TOKEN.
      # See https://github.com/actions/create-github-app-token#how-it-works
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AEGIS_MERGEBOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.AEGIS_MERGEBOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          # Full history needed for git subtree operations.
          fetch-depth: 0
          # Use app token so that pushes and PRs trigger downstream workflows.
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.x
          cache: false

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync branches and PRs
        shell: python
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DISPATCH_PROJECT: ${{ github.event.inputs.project }}
          DISPATCH_BASE: ${{ github.event.inputs.base }}
          DISPATCH_PUSH: ${{ github.event.inputs.push }}
        run: |
          import os
          import subprocess

          # Defaults for scheduled runs (inputs are empty for cron triggers).
          # These must match the workflow_dispatch defaults above.
          project = os.getenv("DISPATCH_PROJECT") or "all"
          base = os.getenv("DISPATCH_BASE") or "main"
          push = (os.getenv("DISPATCH_PUSH") or "true").lower() == "true"

          # --persist: skip worktree cleanup since the CI runner is ephemeral.
          branch_cmd = ["go", "run", "-C", "misc", "./cmd/happydo", "sync-branch", "--project", project, "--base", base, "--persist"]
          if push:
              branch_cmd.append("--push")

          print(" ".join(branch_cmd))
          subprocess.run(branch_cmd, check=True)

          if push:
              pr_cmd = ["go", "run", "-C", "misc", "./cmd/happydo", "sync-pr", "--project", project, "--base", base]
              print(" ".join(pr_cmd))
              subprocess.run(pr_cmd, check=True)
