name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pipeline:
    name: ${{ matrix.os }}
    strategy:
      matrix:
        # TEMP: narrow to Ubuntu only for Delve port-fix stress test
        os: [ubuntu-latest]
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: ${{ matrix.os }}
